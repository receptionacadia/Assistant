<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Reception Assistant — Alpstay Hotels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Belleza&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold: #b8955a; --gold-dark: #9a7038; --gold-pale: #fdf8f0;
  --dark: #111110; --muted: #555; --bg: #fafaf8;
  --border: #e5dfd4; --white: #ffffff; --green: #4ade80;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

html { height: 100%; font-family: 'Belleza', serif; }
body {
  display: flex; flex-direction: column;
  height: 100dvh; /* dynamic viewport height — fixes mobile browser chrome */
  overflow: hidden;
  background: var(--bg); color: var(--dark);
  padding-bottom: var(--safe-bottom);
  padding-top: var(--safe-top);
}

/* ── HEADER ── */
#header {
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 8px 14px 6px;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  flex-shrink: 0;
}
#logo { height: 130px; width: auto; object-fit: contain; }
#status { display: flex; align-items: center; gap: 5px; margin-bottom: 2px; }
#dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
#status-text { font-size: 11px; color: var(--dark); letter-spacing: 0.12em; text-transform: uppercase; font-weight: bold; }
#hotel-badge { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); background: var(--gold-pale); border: 1px solid var(--border); padding: 2px 9px; border-radius: 20px; display: none; }
#hotel-badge.visible { display: inline-block; }
#lang-bar { display: flex; gap: 3px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
.lb { background: transparent; border: 1px solid var(--border); border-radius: 11px; padding: 3px 10px; font-size: 12px; cursor: pointer; font-family: 'Belleza', serif; color: var(--dark); transition: all .15s; font-weight: bold; }
.lb:hover, .lb.on { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); }

/* ── HOTEL TABS ── */
#hotel-tabs {
  background: var(--white); border-bottom: 2px solid var(--border);
  display: flex; flex-shrink: 0;
}
.htab {
  flex: 1; padding: 12px 2px;
  font-size: 14px; font-weight: bold;
  text-align: center; cursor: pointer;
  border-bottom: 3px solid transparent;
  color: var(--dark); transition: all .15s;
  font-family: 'Belleza', serif;
  background: none; border-top: none; border-left: none; border-right: none;
  letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap;
  line-height: 1.2;
}
.htab:hover { color: var(--dark); background: var(--bg); }
.htab.active { border-bottom-color: var(--gold); color: var(--gold); background: var(--gold-pale); font-weight: bold; }
@media (max-width: 360px) {
  .htab { font-size: 12px; padding: 10px 1px; }
}

/* ── MESSAGES ── */
#messages {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 12px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  -webkit-overflow-scrolling: touch;
  min-height: 0; /* critical for flex children on mobile */
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-row { display: flex; align-items: flex-end; gap: 7px; width: 100%; }
.msg-row.user { justify-content: flex-end; }
.msg-row.bot { justify-content: flex-start; }
.avatar { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border); background: var(--white); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.avatar img { width: 20px; height: 20px; object-fit: contain; border-radius: 50%; }

.bubble { max-width: 82%; font-size: 14.5px; line-height: 1.75; font-family: 'Belleza', serif; word-break: break-word; }
.bubble.user { background: var(--gold); color: #fff; border-radius: 15px 15px 4px 15px; padding: 9px 13px; }
.bubble.bot { background: var(--white); color: var(--dark); border: 1px solid var(--border); border-radius: 4px 15px 15px 15px; box-shadow: 0 1px 4px rgba(184,149,90,.06); overflow: hidden; padding: 0; }
.bubble.bot .bubble-img { width: 100%; height: 160px; object-fit: cover; display: block; }
.bubble.bot .bubble-text { padding: 9px 13px; }
.bubble p { margin: 0 0 3px; display: block; }
.bubble p:last-child { margin-bottom: 0; }
.bubble strong { font-weight: 700; }

/* ── TYPING ── */
#typing-row { display: none; }
#typing-row.visible { display: flex; }
.typing-dots { display: flex; gap: 5px; align-items: center; padding: 11px 14px; background: var(--white); border: 1px solid var(--border); border-radius: 4px 15px 15px 15px; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); display: inline-block; animation: dp 1.1s ease-in-out infinite; }
.typing-dots span:nth-child(2) { animation-delay: .18s; }
.typing-dots span:nth-child(3) { animation-delay: .36s; }
@keyframes dp { 0%,100%{opacity:.2;transform:scale(.7)} 50%{opacity:1;transform:scale(1.1)} }

/* ── QUICK CHIPS ── */
#quick {
  padding: 6px 12px 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--white);
  /* Always visible, static, no horizontal scroll */
}
.qb { background: var(--white); border: 1px solid var(--border); border-radius: 13px; padding: 5px 12px; color: var(--dark); font-size: 13px; cursor: pointer; font-family: 'Belleza', serif; transition: all .15s; white-space: nowrap; font-weight: bold; }
.qb:hover, .qb:active { border-color: var(--gold); color: var(--gold); background: var(--gold-pale); }

/* ── INPUT BAR ── */
#input-bar {
  padding: 7px 12px 10px;
  border-top: 1px solid var(--border);
  display: flex; gap: 7px; align-items: flex-end;
  background: var(--white);
  flex-shrink: 0;
  /* iOS safe area */
  padding-bottom: max(10px, calc(6px + var(--safe-bottom)));
}
#user-input {
  flex: 1; border: 1px solid var(--border); border-radius: 10px;
  padding: 9px 12px; resize: none; font-size: 16px; /* 16px prevents iOS zoom */
  font-family: 'Belleza', serif; background: var(--bg); color: var(--dark);
  line-height: 1.4; height: 40px; overflow: hidden;
  transition: border-color .15s; outline: none;
  -webkit-appearance: none; appearance: none;
}
#user-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px #b8955a22; }
#send-btn {
  width: 40px; height: 40px; border-radius: 50%; background: var(--gold);
  border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}
#send-btn:hover, #send-btn:active { background: var(--gold-dark); }
#send-btn:disabled { background: #ece8e0; cursor: not-allowed; }

/* ── MOBILE OVERRIDES ── */
@media (max-width: 480px) {
  #header { padding: 6px 10px 5px; gap: 3px; }
  #logo { height: 82px; }
  .htab { font-size: 12.5px; padding: 10px 2px; letter-spacing: 0.05em; }
  .bubble { font-size: 13.5px; }
  #messages { padding: 10px; gap: 10px; }
}
</style>
</head>

    ko: "**여행 취소 보험**\n\n당사의 여행 취소 보험은 걱정 없는 휴가를 위한 마음의 평안을 드립니다.\n\n**보험사:** Europäische Reiseversicherung (ERV) — 여행 보험 분야 선두 기업\n\n**보험 작동 방식:**\n· **예약 시** 함께 가입 — 즉시 보장\n· 나중에 활성화 시: 보험료 납부 후 **10일째**부터 보장\n· 비용: **총 금액의 5%** → 취소 시 최대 100% 환불\n\n**보장 항목:**\n· 숙박 취소 수수료\n· 항공권, 교통편, 스키 강습\n· 계획된 활동 및 추가 서비스\n· 질병, 부상, 개인 비상 상황\n\n💡 조기 예약 및 성수기에 적합. 귀하의 안심이 저희의 우선 사항!\n\n📞 +39 0471 774444 | 📧 info@alpstay.eu",
    es: "**Seguro de Cancelación de Viaje**\n\nNuestro seguro de cancelación le ofrece tranquilidad para unas vacaciones sin preocupaciones.\n\n**Proveedor:** Europäische Reiseversicherung (ERV) — líder en seguros de viaje\n\n**Cómo funciona:**\n· Contratar **en el momento de la reserva** — cobertura inmediata\n· Si se activa después: cobertura desde el **10.° día** tras el pago\n· Coste: **5% del importe total** → reembolso hasta el 100%\n\n**Qué cubre:**\n· Gastos de cancelación de la estancia\n· Vuelos, traslados, clases de esquí\n· Actividades programadas y servicios adicionales\n· Enfermedad, lesiones, emergencias personales\n\n💡 Ideal para reservas anticipadas y temporada alta. ¡Su tranquilidad es nuestra prioridad!\n\n📞 +39 0471 774444 | 📧 info@alpstay.eu",
    ru: "**Страхование отмены путешествия**\n\nНаша страховка от отмены поездки обеспечивает вам спокойствие для беззаботного отдыха.\n\n**Страховщик:** Europäische Reiseversicherung (ERV) — лидер в страховании путешествий\n\n**Как это работает:**\n· Оформить **одновременно с бронированием** — немедленное покрытие\n· При более позднем оформлении: покрытие с **10-го дня** после уплаты премии\n· Стоимость: **5% от общей суммы** → возврат до 100%\n\n**Что покрывает:**\n· Штрафы за отмену проживания\n· Авиабилеты, трансферы, уроки лыж\n· Запланированные мероприятия и доп. услуги\n· Болезнь, травмы, личные непредвиденные обстоятельства\n\n💡 Идеально для раннего бронирования и пикового сезона. Ваше спокойствие — наш приоритет!\n\n📞 +39 0471 774444 | 📧 info@alpstay.eu",

// ── NORMALISE ─────────────────────────────────────────────────────────────────
function norm(t){ return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }

// ── LANGUAGE DETECTION ────────────────────────────────────────────────────────
function detectLang(t) {
  if (/[\u4e00-\u9fff\u3400-\u4dbf\uff00-\uffef]/.test(t)) return "zh";
  if (/[\uac00-\ud7af]/.test(t)) return "ko";
  if (/[\u0400-\u04ff]/.test(t)) return "ru";

  const s = norm(t);

  // Definitive English words (many of these won't appear in IT/DE)
  const enWords = ["the","this","that","what","where","when","how","can","could","would","should","will","have","has","are","were","been","your","for","breakfast","check","room","booking","cancel","hotel","please","hello","hi","good","morning","evening","need","want","like","does","get","sauna","skiing","wellness","pets","dogs","parking","arrival","departure","stay","included","include","accommodation","service","early","late","luggage","transport","pass","price","cost","wifi","facilities","amenities","reception","info","information","help","support","pool","gym","lift","lifts","resort","slope","slopes","fitness","dinner","dining","shuttle","transfer","charge","fee"];
  const deWords = ["ich","bitte","danke","wie","haben","sind","das","die","der","und","nicht","ein","eine","wo","was","wann","kann","zimmer","hund","frühstück","fruhstuck","anreise","buchen","skifahren","wellness","sauna","stornierung","kosten","preis","bett","urlaub","reise","informationen","hunde","haustier","essen","frühstücken","checkin","checkout","ankunft","abreise","parkplatz","aufenthalt","kosten","buchung","storno","badewanne","schlüssel","rezeption","abfahrt","liegt","liegt","liegt","gilt","empfehle","liegt","empfehlung"];
  const itWords = ["ciao","buongiorno","vorrei","grazie","avete","sono","ho","mi","per","un","una","il","la","ma","dove","cosa","quando","posso","come","camere","colazione","prenotare","cancellare","benvenuto","salve","buonasera","prego","quanto","incluso","servizi","orari","cane","cani","sauna","wellness","sci","impianti","navetta","buffet","check","albergo","soggiorno","piscina","palestra","pasti","cena","arrivo","partenza","parcheggio","prenotazione","rimborso","annullamento","vasca","chiave","reception","biglietto","gratuito","disponibile"];
  const esWords = ["hola","buenos","gracias","tiene","puede","tengo","quiero","habitacion","cuando","donde","también","precio","cancelar","reserva","desayuno","llegada","salida","incluido","informacion","mascotas","perro","esquí","bienestar","sauna","piscina","gimnasio","aparcamiento","traslado","factura","habitaciones","servicio","bienvenido"];

  const s_words = s.split(/[\s,.:?!]+/);
  const enScore = enWords.filter(w => s_words.some(sw => sw === w)).length + enWords.filter(w => w.length > 4 && s.includes(w)).length * 0.5;
  const deScore = deWords.filter(w => s.includes(w)).length;
  const itScore = itWords.filter(w => s.includes(w)).length;
  const esScore = esWords.filter(w => s.includes(w)).length;

  const max = Math.max(enScore, deScore, itScore, esScore);
  if (max < 0.5) return currentLang; // No clear signal → keep current

  if (enScore >= max - 0.1) return "en"; // English slight tie-break
  if (deScore === max) return "de";
  if (esScore === max) return "es";
  if (itScore === max) return "it";
  return currentLang;
}

// ── FIND ANSWER ────────────────────────────────────────────────────────────────
function findAnswer(input, lang) {
  const t = norm(input);

  // 1. Try alias table first
  let aliasHit = null;
  // Sort keys by length descending so longer phrases match first
  const aliases = Object.keys(KEY_ALIASES).sort((a,b) => b.length - a.length);
  for (const phrase of aliases) {
    if (t.includes(norm(phrase))) {
      aliasHit = KEY_ALIASES[phrase];
      break;
    }
  }

  // 2. If we got a hotel name as alias hit, switch to that hotel's entry
  const hotelEntries = ["hartmann","saslong","acadia"];
  if (aliasHit && hotelEntries.includes(aliasHit)) {
    const entry = KB[aliasHit];
    if (entry) {
      const text = entry[lang] || entry.en || entry.it;
      return { text, thumb: entry.thumb || null };
    }
  }

  // 3. For topic aliases, find the matching KB entry
  if (aliasHit && KB[aliasHit]) {
    const entry = KB[aliasHit];
    // Filter by hotel context if needed
    if (currentHotel !== "all") {
      if (!entry.hotels.includes("all") && !entry.hotels.includes(currentHotel)) {
        // Topic exists but not for this hotel — still return it (it'll say "not available")
      }
    }
    const text = entry[lang] || entry.en || entry.it;
    return { text, thumb: entry.thumb || null };
  }

  // 4. Fallback: score all KB entries
  let best = null, bestScore = 0;
  for (const [key, entry] of Object.entries(KB)) {
    if (currentHotel !== "all" && !entry.hotels.includes("all") && !entry.hotels.includes(currentHotel)) continue;
    let score = 0;
    for (const kw of entry.keys) {
      const k = norm(kw);
      if (t.includes(k)) score += k.length > 5 ? 4 : k.length > 3 ? 2 : 1;
      else {
        const parts = k.split(" ");
        score += parts.filter(p => p.length > 3 && t.includes(p)).length * 0.7;
      }
    }
    if (currentHotel !== "all" && entry.hotels.includes(currentHotel)) score += 1;
    if (score > bestScore) { bestScore = score; best = entry; }
  }
  if (!best || bestScore < 1.5) return null;
  const rawText = best[lang] || best.en || best.it;
  const thumb   = best.thumb || null;
  // If on a specific hotel tab, extract only that hotel's section from multi-hotel responses
  if (currentHotel !== "all" && best.hotels && best.hotels.includes("all")) {
    const filtered = extractHotelSection(rawText, currentHotel);
    if (filtered) return { text: filtered, thumb };
  }
  return { text: rawText, thumb };
}

// ── HOTEL SECTION EXTRACTOR ────────────────────────────────────────────────────
// Parses multi-hotel KB text and returns only the section for the current hotel.
// Sections are separated by "**Hotel Name**" markers on their own line.
function extractHotelSection(text, hotel) {
  if (!text || !hotel) return null;

  // Which bold header patterns identify each hotel in the text
  const HOTEL_HEADERS = {
    acadia:   ["**Hotel Acadia", "**Acadia"],
    hartmann: ["**Chalet Hotel Hartmann", "**Chalet Hartmann", "**Hotel Hartmann"],
    saslong:  ["**Smart Hotel Saslong", "**Blu Restaurant", "**Honesty Bar"],
  };
  // Which headers belong to OTHER hotels (to detect end of our section)
  const OTHER_HEADERS = {
    acadia:   ["**Chalet Hotel Hartmann", "**Chalet Hartmann", "**Hotel Hartmann", "**Smart Hotel Saslong"],
    hartmann: ["**Hotel Acadia", "**Acadia", "**Smart Hotel Saslong"],
    saslong:  ["**Hotel Acadia", "**Acadia", "**Chalet Hotel Hartmann", "**Chalet Hartmann"],
  };

  const myHeaders  = HOTEL_HEADERS[hotel]  || [];
  const otherHdrs  = OTHER_HEADERS[hotel]  || [];

  const lines = text.split("\n");
  let inSection = false, found = false, result = [];

  for (const line of lines) {
    const isMyHotel    = myHeaders.some(h  => line.includes(h));
    const isOtherHotel = otherHdrs.some(h  => line.includes(h));

    if (isMyHotel) {
      inSection = true; found = true;
      result.push(line);
    } else if (isOtherHotel && found) {
      break; // End of our hotel's section
    } else if (inSection) {
      result.push(line);
    }
  }

  if (found && result.length > 1) {
    // Remove trailing empty lines
    while (result.length && result[result.length - 1].trim() === "") result.pop();
    return result.join("\n").trim();
  }
  return null; // No section found → return full text
}

// ── RENDER ─────────────────────────────────────────────────────────────────────
function mdToHtml(text) {
  return text.split("\n").map(line => {
    line = line.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    line = line.replace(/\*([^*]+)\*/g, '<em>$1</em>');
    return `<p>${line}</p>`;
  }).join("");
}

function clearMessages() {
  document.getElementById("messages").querySelectorAll(".msg-row:not(#typing-row)").forEach(r => r.remove());
  messageCount = 0;
  // quick bar always visible
}

function addMessage(role, text, thumb) {
  const messages = document.getElementById("messages");
  const typing   = document.getElementById("typing-row");
  const row = document.createElement("div");
  row.className = `msg-row ${role}`;
  if (role === "bot") {
    const imgTag = (thumb)
      ? `<img class="bubble-img" src="${thumb}" alt="" onerror="this.style.display='none'" loading="lazy">`
      : "";
    row.innerHTML = `
      <div class="avatar"><img src="${LOGO_SRC}" alt="A"></div>
      <div class="bubble bot">${imgTag}<div class="bubble-text">${mdToHtml(text)}</div></div>`;
  } else {
    const esc = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    row.innerHTML = `<div class="bubble user">${esc}</div>`;
  }
  messages.insertBefore(row, typing);
  messageCount++;
  messages.scrollTop = messages.scrollHeight;
}

function updateHotelBadge() {
  const badge = document.getElementById("hotel-badge");

    badge.classList.remove("visible");

    badge.textContent = HOTEL_BADGE[currentHotel][currentLang] || HOTEL_BADGE[currentHotel].en;

function setHotelUI(hotel) {
  if (hotel === currentHotel) return;
  currentHotel = hotel;
  document.querySelectorAll(".htab").forEach(b => b.classList.toggle("active", b.dataset.hotel === hotel));
  updateHotelBadge();
  clearMessages();
  const w = WELCOME[hotel];
  addMessage("bot", w[currentLang] || w.en, null);
}

function buildQuick(l) {
  const qc = document.getElementById("quick");
  qc.innerHTML = "";

  (QUICK[l] || QUICK.en).forEach(q => {
    const btn = document.createElement("button");
    btn.className = "qb"; btn.textContent = q;
    btn.onclick = () => { sendQuick(q); };
    qc.appendChild(btn);
  });
}

  ru: { asking: "📍 Определение вашего местоположения...", opening: "🗺️ Открываю Google Maps с маршрутом до **{hotel}**!", fallback: "🗺️ Открываю Google Maps для **{hotel}**...", error: "❌ Не удалось получить местоположение. Открываю Google Maps!", denied: "⚠️ Доступ к местоположению запрещён. Открываю Google Maps без начальной точки." },
};

function openMapsNavigation(hotel) {
  const info = HOTEL_MAPS[hotel];
  if (!info) return false;
  const msgs = NAV_MSG[currentLang] || NAV_MSG.en;
  const hotelName = info.name;

  function buildMapsURL(originLat, originLng) {
    const dest = encodeURIComponent(info.address);
    if (originLat && originLng) {
      return `https://www.google.com/maps/dir/?api=1&origin=${originLat},${originLng}&destination=${dest}&travelmode=driving`;
    } else {
      return `https://www.google.com/maps/dir/?api=1&destination=${dest}&travelmode=driving`;
    }
  }

  function openMaps(url, msgKey) {
    const msg = (msgs[msgKey] || msgs.opening).replace('{hotel}', hotelName);
    addMessage("bot", msg, null);
    setTimeout(() => { window.open(url, '_blank'); }, 400);
  }

  // Show "getting location" message
  addMessage("user", QUICK[currentLang]?.[QUICK[currentLang].findIndex(q => NAV_LABELS.includes(q.toLowerCase()))] || "Come arrivare", null);
  addMessage("bot", msgs.asking, null);

  if (!navigator.geolocation) {
    // No geolocation support — open Maps with just destination
    openMaps(buildMapsURL(null, null), 'fallback');
    return true;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      openMaps(buildMapsURL(latitude, longitude), 'opening');
    },
    (err) => {
      if (err.code === err.PERMISSION_DENIED) {
        openMaps(buildMapsURL(null, null), 'denied');
      } else {
        openMaps(buildMapsURL(null, null), 'error');
      }
    },
    { timeout: 8000, maximumAge: 60000 }
  );
  return true;
}

// Quick button sends with CURRENT language — no detectLang
function sendQuick(text) {
  // ── Special case: navigation button on a specific hotel tab ──
  if (currentHotel !== "all" && NAV_LABELS.includes(text.toLowerCase())) {
    openMapsNavigation(currentHotel);
    return;
  }
  // ── Normal flow ──
  addMessage("user", text, null);
  const typing = document.getElementById("typing-row");
  typing.classList.add("visible");
  document.getElementById("messages").scrollTop = 99999;
  setTimeout(() => {
    typing.classList.remove("visible");
    const result = findAnswer(text, currentLang);
    if (result) addMessage("bot", result.text, result.thumb);
    else        addMessage("bot", FALLBACK[currentLang] || FALLBACK.en, null);
  }, 350 + Math.random() * 250);
}

function send() {
  const inp  = document.getElementById("user-input");
  const text = inp.value.trim();
  if (!text) return;
  inp.value = ""; inp.style.height = "40px"; checkSendBtn();

  const detLang = detectLang(text);
  const useLang = ["it","de","en","zh","ko","es","ru"].includes(detLang) ? detLang : currentLang;
  setLangUI(useLang);
  addMessage("user", text, null);

  const typing = document.getElementById("typing-row");
  typing.classList.add("visible");
  document.getElementById("messages").scrollTop = 99999;

  setTimeout(() => {
    typing.classList.remove("visible");
    const result = findAnswer(text, useLang);
    if (result) addMessage("bot", result.text, result.thumb);
    else        addMessage("bot", FALLBACK[useLang] || FALLBACK.en, null);
  }, 350 + Math.random() * 250);
}

// ── MOBILE: fix viewport height on iOS when keyboard appears ──────────────────
function fixVH() {
  // Use visualViewport API if available for accurate height
  const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
  document.documentElement.style.setProperty('--real-vh', h + 'px');
  // Also scroll to bottom of messages
  const msgs = document.getElementById("messages");
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', fixVH);
} else {
  window.addEventListener('resize', fixVH);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  fixVH();
  setLangUI("it");
  addMessage("bot", WELCOME.all.it, null);

  const inp = document.getElementById("user-input");
  inp.addEventListener("input", function() {
    this.style.height = "40px";
    this.style.height = Math.min(this.scrollHeight, 100) + "px";
    checkSendBtn();
  });
  inp.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });

  document.querySelectorAll(".lb[data-lang]").forEach(b => {
    b.addEventListener("click", function() {
      const newLang = this.dataset.lang;
      if (newLang === currentLang) return;
      clearMessages();
      setLangUI(newLang);
      // Show welcome message in new language
      const w = WELCOME[currentHotel];
      addMessage("bot", w[newLang] || w.en, null);
    });
  });
  document.querySelectorAll(".htab[data-hotel]").forEach(b => {
    b.addEventListener("click", function() { setHotelUI(this.dataset.hotel); });
  });
});
</script>
